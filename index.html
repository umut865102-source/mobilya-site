<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
color:#222;
}

header{
background:#111;
color:white;
padding:20px;
text-align:center;
}

header h1{
font-size:32px;
}

.hero{
height:400px;
background:url('https://images.unsplash.com/photo-1505693416388-ac5ce068fe85?q=80&w=1600') center/cover;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
color:white;
padding:20px;
}

.hero-content{
background:rgba(0,0,0,0.5);
padding:30px;

}

.hero h2{
font-size:40px;
margin-bottom:10px;
}

.hero p{
font-size:18px;
}

.products{
padding:40px 20px;
max-width:1200px;
margin:auto;
}

.products h2{
text-align:center;
margin-bottom:30px;
font-size:32px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card img{
width:100%;
height:250px;
object-fit:cover;
}

.card-content{
padding:20px;
}

.card-content h3{
margin-bottom:10px;
}

.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
padding:15px 20px;
border-radius:50px;
text-decoration:none;
font-weight:bold;
box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

footer{
background:#111;
color:white;
text-align:center;
padding:20px;
margin-top:40px;
}

@media(max-width:768px){

.hero{
height:300px;
}

.hero h2{
font-size:28px;
}

}

</style>
</head>
